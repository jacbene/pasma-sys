<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main>
            <div id="loading" class="loading hidden">Loading...</div>
            <div id="error" class="error hidden"></div>
            
            <div class="weather-grid">
                <!-- Current Weather -->
                <section class="current-weather card">
                    <div id="currentWeatherContent">
                        <p class="placeholder">Search for a city to see weather</p>
                    </div>
                </section>

                <!-- 5-Day Forecast -->
                <section class="forecast card">
                    <h2>5-Day Forecast</h2>
                    <div id="forecastContent" class="forecast-grid">
                        <p class="placeholder">Search for a city to see forecast</p>
                    </div>
                </section>

                <!-- Weather Details -->
                <section class="details card">
                    <h2>Weather Details</h2>
                    <div id="detailsContent" class="details-grid">
                        <p class="placeholder">Search for a city to see details</p>
                    </div>
                </section>

                <!-- Hourly Forecast -->
                <section class="hourly card">
                    <h2>Hourly Forecast</h2>
                    <div id="hourlyContent" class="hourly-grid">
                        <p class="placeholder">Search for a city to see hourly forecast</p>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>Weather data powered by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
